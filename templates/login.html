<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login – Paddlingen</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-login-page">
  <main class="login-shell">
    <section class="login-card-section">
      <div class="login-card">
        <div class="login-card-header">
          <p class="login-step-label">Administratör</p>
          <h1>Logga in</h1>
          <p class="login-card-copy">
            Använd dina adminuppgifter för att öppna kontrollpanelen.
          </p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="login-toast-stack" aria-live="polite">
              {% for category, msg in messages %}
                <div class="login-toast login-toast-{{ category }}">{{ msg }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post" class="login-form">
          <input
            type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}"
          >

          <label class="login-field" for="username">
            <span>Användarnamn</span>
            <input id="username" type="text" name="username" required autofocus>
          </label>

          <label class="login-field" for="password">
            <span>Lösenord</span>
            <input id="password" type="password" name="password" required>
          </label>

          <button type="submit" class="login-submit">Logga in</button>
        </form>

        <a class="login-home-link" href="{{ url_for('main.index') }}">Tillbaka till hemsidan</a>
      </div>
    </section>
  </main>
</body>
</html>
