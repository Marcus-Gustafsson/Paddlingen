<!DOCTYPE html>
<html lang="sv-SE">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login – Paddlingen</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-login-page">
  <main class="login-shell">
    <section class="login-card-section">
      <div class="login-card">
        <div class="login-card-header">
          <p class="login-step-label">Administratör</p>
          <h1>Logga in</h1>
          <p class="login-card-copy">
            Använd dina adminuppgifter för att öppna kontrollpanelen.
          </p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="login-toast-stack" aria-live="polite">
              {% for category, msg in messages %}
                <div class="login-toast login-toast-{{ category }}">{{ msg }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post" class="login-form">
          <input
            type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}"
          >

          <label class="login-field" for="username">
            <span>Användarnamn</span>
            <input id="username" type="text" name="username" required autofocus>
          </label>

          <label class="login-field" for="password">
            <span>Lösenord</span>
            <div class="password-input-shell">
              <input id="password" type="password" name="password" required>
              <button
                type="button"
                class="password-visibility-toggle"
                data-password-toggle
                data-show-label="Visa lösenord"
                data-hide-label="Dölj lösenord"
                aria-label="Visa lösenord"
                aria-pressed="false"
              >
                <svg class="password-visibility-icon password-visibility-icon--password-hidden" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M10.7 5.3A11 11 0 0 1 12 5.2c6.4 0 10 6 10 6a18.1 18.1 0 0 1-4 4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M6.2 6.2C3.6 8 2 11.2 2 11.2s3.6 6 10 6c1.3 0 2.4-.2 3.5-.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <svg class="password-visibility-icon password-visibility-icon--password-visible" viewBox="0 0 24 24" aria-hidden="true" hidden>
                  <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="3.1" fill="none" stroke="currentColor" stroke-width="1.8"/>
                </svg>
              </button>
            </div>
          </label>

          <button type="submit" class="login-submit">Logga in</button>
        </form>

        <a class="login-home-link" href="{{ url_for('main.index') }}">Tillbaka till hemsidan</a>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/admin_dashboard.js') }}"></script>
</body>
</html>
